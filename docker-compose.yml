services:
  # ── Generador de artículos ────────────────────────────────────────────────
  # Ejecuta generateArticle.py una vez y termina.
  # Uso:
  #   docker compose run --rm app --tag "@Data" --category "Spring Boot" --subcategory "Lombok"
  #
  # El artículo generado se guarda en ./output/article.json (volumen montado).
  app:
    build: .
    image: article-generator:latest
    env_file:
      - .env
    volumes:
      - ./output:/app/output
    restart: "no"
