# ============================================================
# Secret – variables de entorno sensibles
# ============================================================
# 1. Codifica cada valor en base64:
#      echo -n "mi-valor-real" | base64
# 2. Sustituye los campos <BASE64_...> con los valores obtenidos.
# 3. Aplicar:  kubectl apply -f k8s/secret.yaml
#
# NOTA: No incluyas este fichero con valores reales en el
#       repositorio. Añádelo a .gitignore o usa un gestor de
#       secretos (Sealed Secrets, External Secrets, Vault…).
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: article-generator-secret
  labels:
    app: article-generator
type: Opaque
data:
  # echo -n "mongodb+srv://ex_dbuser:<password>@cluster0.9kjmkdg.mongodb.net/?appName=Cluster0" | base64
  MONGODB_URI: <BASE64_MONGODB_URI>
  # echo -n "sk-XXXXXXXXXXXXXXXXXXXX" | base64
  OPENAIAPIKEY: <BASE64_OPENAIAPIKEY>
  # echo -n "tu_correo@gmail.com" | base64
  SMTP_USER: <BASE64_SMTP_USER>
  # echo -n "tu_contraseña_de_aplicacion" | base64
  SMTP_PASS: <BASE64_SMTP_PASS>
